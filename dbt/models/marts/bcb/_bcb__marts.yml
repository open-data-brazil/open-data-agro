version: 2

models:
  - name: mart_bcb__sgs_ipca
    description: |
      BCB SGS IPCA monthly variation (code 433).
      Grain is sgs_codigo + data.
    config:
      meta:
        dataset_id: bcb.sgs-ipca
        grain: sgs_codigo, data
    columns:
      - name: sgs_codigo
        tests:
          - not_null
      - name: data
        tests:
          - not_null
      - name: valor
        tests:
          - not_null
      - name: capturado_em
        tests:
          - not_null
      - name: fonte_oficial
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sgs_codigo
              - data

