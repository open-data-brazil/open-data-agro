version: 2

models:
  - name: mart_eia__petroleum_prices
    description: U.S. EIA daily petroleum spot prices (WTI and Brent).
    config:
      meta:
        dataset_id: eia.petroleum-prices
        grain: series_id, refdate
    columns:
      - name: series_id
        tests: [not_null]
      - name: commodity_slug
        tests: [not_null]
      - name: refdate
        tests: [not_null]
      - name: value
        tests: [not_null]
      - name: capturado_em
        tests: [not_null]
      - name: fonte_oficial
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [series_id, refdate]
