name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: go.sum

      - name: Install DuckDB CLI
        run: make duckdb-install

      - name: Sync workspace
        run: go work sync

      - name: Test
        run: go test ./...

      - name: DuckDB integration
        env:
          PATH: ${{ github.workspace }}/.local/bin:${{ env.HOME }}/.duckdb/cli/latest:${{ env.PATH }}
        run: DUCKDB_INTEGRATION=1 go test ./internal/processor -run 'SmokeLocal|PreviewPromote' -count=1

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: ./...
