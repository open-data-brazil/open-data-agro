name: open_data_agro
version: '1.0.0'
config-version: 2

profile: open_data_agro

model-paths: ['models']
analysis-paths: ['analyses']
test-paths: ['tests']
seed-paths: ['seeds']
macro-paths: ['macros']
snapshot-paths: ['snapshots']

target-path: target
clean-targets:
  - target
  - dbt_packages

vars:
  lake_root: "{{ env_var('LAKE_LOCAL_ROOT', '../lake') }}"
  gold_root: "{{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/gold"
  conab_fonte_oficial: 'https://portaldeinformacoes.conab.gov.br/download-arquivos.html'

models:
  open_data_agro:
    staging:
      conab:
        +materialized: view
    intermediate:
      conab:
        +materialized: view
    marts:
      conab:
        +materialized: external
