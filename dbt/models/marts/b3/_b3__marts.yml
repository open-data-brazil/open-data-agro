version: 2

models:
  - name: mart_b3__futuro_soja
    description: B3 SOY futures daily settlement prices. Grain is refdate + symbol.
    config:
      meta:
        dataset_id: b3.futuro-soja
        grain: refdate, symbol
    columns:
      - name: refdate
        tests: [not_null]
      - name: symbol
        tests: [not_null]
      - name: price
        tests: [not_null]
      - name: capturado_em
        tests: [not_null]
      - name: fonte_oficial
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [refdate, symbol]

  - name: mart_b3__futuro_milho
    description: B3 CCM corn futures daily settlement prices.
    config:
      meta:
        dataset_id: b3.futuro-milho
        grain: refdate, symbol
    columns:
      - name: refdate
        tests: [not_null]
      - name: symbol
        tests: [not_null]
      - name: price
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [refdate, symbol]

  - name: mart_b3__futuro_boi
    description: B3 BGI live cattle futures daily settlement prices.
    config:
      meta:
        dataset_id: b3.futuro-boi
        grain: refdate, symbol
    columns:
      - name: refdate
        tests: [not_null]
      - name: symbol
        tests: [not_null]
      - name: price
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [refdate, symbol]
