version: 2

sources:
  - name: conab_silver
    description: CONAB silver Delta tables promoted from bronze Parquet (local-first).
    meta:
      fonte_oficial: https://portaldeinformacoes.conab.gov.br/download-arquivos.html
      agencia: CONAB
    tables:
      - name: estimativa_graos
        description: Estimativa de grãos — reads {{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/silver/conab/estimativa_graos
        meta:
          dataset_id: conab.estimativa-graos
          fonte_oficial: https://portaldeinformacoes.conab.gov.br/download-arquivos.html
          agencia: CONAB
          silver_path: "{{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/silver/conab/estimativa_graos"

      - name: serie_historica_graos
        description: Série histórica de grãos — reads {{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/silver/conab/serie_historica_graos
        meta:
          dataset_id: conab.serie-historica-graos
          fonte_oficial: https://portaldeinformacoes.conab.gov.br/download-arquivos.html
          agencia: CONAB
          silver_path: "{{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/silver/conab/serie_historica_graos"

      - name: oferta_demanda
        description: Oferta e demanda — reads {{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/silver/conab/oferta_demanda
        meta:
          dataset_id: conab.oferta-demanda
          fonte_oficial: https://portaldeinformacoes.conab.gov.br/download-arquivos.html
          agencia: CONAB
          conab_section: Mercado
          silver_path: "{{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/silver/conab/oferta_demanda"

      - name: estoques_publicos
        description: Estoques públicos — reads {{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/silver/conab/estoques_publicos
