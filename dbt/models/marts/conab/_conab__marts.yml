version: 2

models:
  - name: mart_conab__estimativa_graos
    description: |
      Business mart — grain is produto + uf + safra (one row per crop, state, and season).
      Materialized to lake/gold/mart_conab__estimativa_graos/ as Parquet (local-first).
    config:
      meta:
        dataset_id: conab.estimativa-graos
        grain: produto, uf, safra
    columns:
      - name: produto
        tests:
          - not_null
      - name: uf
        tests:
          - not_null
      - name: safra
        tests:
          - not_null
      - name: capturado_em
        description: Capture timestamp (_ingested_at from silver).
        tests:
          - not_null
      - name: fonte_oficial
        description: CONAB portal URL (required citation).
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - produto
              - uf
              - safra

  - name: mart_conab__serie_historica_graos
    description: |
      Business mart — grain is produto + uf + ano (historical series).
      Materialized to lake/gold/mart_conab__serie_historica_graos/ as Parquet (local-first).
    config:
      meta:
        dataset_id: conab.serie-historica-graos
        grain: produto, uf, ano
    columns:
      - name: produto
        tests:
          - not_null
      - name: uf
        tests:
          - not_null
      - name: ano
        tests:
          - not_null
      - name: capturado_em
        tests:
          - not_null
      - name: fonte_oficial
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - produto
              - uf
              - ano

  - name: mart_conab__oferta_demanda
    description: |
      Business mart — supply/demand balance grain is produto + safra.
      Materialized to lake/gold/mart_conab__oferta_demanda/ as Parquet (local-first).
    config:
      meta:
        dataset_id: conab.oferta-demanda
        grain: produto, safra
        conab_section: Mercado
    columns:
      - name: produto
        tests:
          - not_null
      - name: safra
        tests:
          - not_null
      - name: capturado_em
        tests:
          - not_null
      - name: fonte_oficial
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - produto
              - safra
