services:
  postgres:
    image: postgres:18.4-bookworm
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: open_data_agro
      POSTGRES_PASSWORD: open_data_agro
      POSTGRES_DB: open_data_agro
    volumes:
      # PostgreSQL 18+ — mount parent dir (versioned PGDATA inside)
      - postgres_data:/var/lib/postgresql
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U open_data_agro -d open_data_agro']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.8.0-bookworm
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    ports:
      - '${MINIO_HOST_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: ['server', '/data', '--console-address', ':9001']
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-10-15T17-29-55Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    command: /init/create-buckets.sh
    volumes:
      - ./infra/minio/init:/init:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-open-data-agro}

volumes:
  postgres_data:
  redis_data:
  minio_data:
