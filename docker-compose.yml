services:
  postgres:
    image: postgres:18.4-bookworm
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: open_data_agro
      POSTGRES_PASSWORD: open_data_agro
      POSTGRES_DB: open_data_agro
    volumes:
      # PostgreSQL 18+ — mount parent dir (versioned PGDATA inside)
      - postgres_data:/var/lib/postgresql
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U open_data_agro -d open_data_agro']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.8.0-bookworm
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
