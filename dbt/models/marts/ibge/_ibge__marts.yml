    columns:
      - name: codigo_mesorregiao
        tests:
          - not_null
          - unique
      - name: nome
        tests:
          - not_null
      - name: sigla_uf
        tests:
          - not_null
      - name: capturado_em
        tests:
          - not_null
      - name: fonte_oficial
        tests:
