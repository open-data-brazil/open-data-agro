          dataset_id: conab.estoques-publicos
          fonte_oficial: https://portaldeinformacoes.conab.gov.br/download-arquivos.html
          agencia: CONAB
          conab_section: Abastecimento
          silver_path: "{{ env_var('LAKE_LOCAL_ROOT', '../lake') }}/silver/conab/estoques_publicos"
