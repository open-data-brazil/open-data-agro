version: 2

models:
  - name: mart_cepea__soja_paranagua
    description: |
      CEPEA daily soja port reference price (Paranaguá).
      Grain is produto + praca + data.
    config:
      meta:
        dataset_id: cepea.soja-paranagua
        grain: produto, praca, data
        licenca: CC BY-NC 4.0
    columns:
      - name: data
        tests:
          - not_null
      - name: preco_rs_sc
        tests:
          - not_null
      - name: capturado_em
        tests:
          - not_null
      - name: fonte_oficial
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - produto
              - praca
              - data

