version: 2

models:
  - name: mart_usda__psd_soja
    description: USDA FAS soybean PSD by country and marketing year.
    config:
      meta:
        dataset_id: usda.psd-soja
        grain: country_code, marketing_year, attribute_id, calendar_year, month
    columns:
      - name: country_code
        tests: [not_null]
      - name: marketing_year
        tests: [not_null]
      - name: attribute_id
        tests: [not_null]
      - name: value
        tests: [not_null]
      - name: capturado_em
        tests: [not_null]
      - name: fonte_oficial
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [country_code, marketing_year, attribute_id, calendar_year, month]

