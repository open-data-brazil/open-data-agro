version: 2

models:
  - name: mart_fao__prices_agro
    description: FAO FAOSTAT producer prices for key ag commodities by country and year.
    config:
      meta:
        dataset_id: fao.prices-agro
        grain: area_code, item_code, element_code, year, months_code
    columns:
      - name: area_code
        tests: [not_null]
      - name: item_code
        tests: [not_null]
      - name: element_code
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: value
        tests: [not_null]
      - name: capturado_em
        tests: [not_null]
      - name: fonte_oficial
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [area_code, item_code, element_code, year, months_code]

  - name: mart_fao__producao_agro
    description: FAO FAOSTAT annual production by country for key ag commodities.
    config:
      meta:
        dataset_id: fao.producao-agro
        grain: area_code, item_code, element_code, year
    columns:
      - name: area_code
        tests: [not_null]
      - name: commodity_slug
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: value
        tests: [not_null]
      - name: capturado_em
        tests: [not_null]
      - name: fonte_oficial
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [area_code, item_code, element_code, year]

  - name: mart_fao__comercio_agro
    description: FAO FAOSTAT annual trade quantities by country for key ag commodities.
    config:
      meta:
        dataset_id: fao.comercio-agro
        grain: area_code, item_code, element_code, year
    columns:
      - name: area_code
        tests: [not_null]
      - name: element_code
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: capturado_em
        tests: [not_null]
      - name: fonte_oficial
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [area_code, item_code, element_code, year]
