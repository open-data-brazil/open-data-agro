name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: go.sum

      - name: Install DuckDB CLI
        run: make duckdb-install

      - name: Sync workspace
        run: go work sync

      - name: Test
        run: go test ./...

      - name: DuckDB integration
        env:
          PATH: ${{ github.workspace }}/.local/bin:${{ env.HOME }}/.duckdb/cli/latest:${{ env.PATH }}
        run: DUCKDB_INTEGRATION=1 go test ./internal/processor -run 'SmokeLocal|PreviewPromote' -count=1

      - name: Great Expectations integration
        run: GE_INTEGRATION=1 go test ./internal/processor -run 'Quality' -count=1

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: ./...

  dbt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python toolchain
        run: pip install -r toolchain/python-requirements.txt

      - name: Install DuckDB CLI
        run: make duckdb-install

      - name: Seed silver lake for dbt
        env:
          LAKE_LOCAL_ROOT: /tmp/open-data-agro-lake
        run: python3 scripts/ci/seed_dbt_silver.py

      - name: Configure dbt profile
        run: cp dbt/profiles.yml.example dbt/profiles.yml

      - name: dbt build
        env:
          LAKE_LOCAL_ROOT: /tmp/open-data-agro-lake
          DUCKDB_PATH: /tmp/open-data-agro-ci.duckdb
          PATH: ${{ github.workspace }}/.local/bin:${{ env.HOME }}/.duckdb/cli/latest:${{ env.PATH }}
        working-directory: dbt
        run: |
          dbt deps --profiles-dir .
          dbt build --profiles-dir . --select 'stg_conab__serie_historica_graos stg_conab__estimativa_graos+'

      - name: dbt docs generate
        env:
          LAKE_LOCAL_ROOT: /tmp/open-data-agro-lake
          DUCKDB_PATH: /tmp/open-data-agro-ci.duckdb
          PATH: ${{ github.workspace }}/.local/bin:${{ env.HOME }}/.duckdb/cli/latest:${{ env.PATH }}
        working-directory: dbt
        run: dbt docs generate --profiles-dir .

      - name: Upload dbt docs
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/target/
          retention-days: 7

      - name: Analytics init and smoke
        env:
          LAKE_LOCAL_ROOT: /tmp/open-data-agro-lake
          DUCKDB_PATH: /tmp/open-data-agro-analytics.duckdb
          PATH: ${{ github.workspace }}/.local/bin:${{ env.HOME }}/.duckdb/cli/latest:${{ env.PATH }}
        run: |
          python3 scripts/ci/seed_mercado_silver.py
          cd dbt && dbt build --profiles-dir . --select 'stg_conab__oferta_demanda+'
          make analytics-init LAKE_LOCAL_ROOT=/tmp/open-data-agro-lake DUCKDB_PATH=/tmp/open-data-agro-analytics.duckdb
          duckdb /tmp/open-data-agro-analytics.duckdb -c "SELECT COUNT(*) FROM analytics.conab_oferta_demanda"
          make analytics-smoke DUCKDB_PATH=/tmp/open-data-agro-analytics.duckdb
          duckdb /tmp/open-data-agro-analytics.duckdb -c "SELECT * FROM analytics.conab_estimativa_graos LIMIT 10"

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python toolchain
        run: pip install -r toolchain/python-requirements.txt

      - name: Seed bronze lake for GE
        env:
          LAKE_LOCAL_ROOT: /tmp/open-data-agro-lake
        run: python3 scripts/ci/seed_ge_bronze.py

      - name: Run bronze checkpoint
        env:
          LAKE_LOCAL_ROOT: /tmp/open-data-agro-lake
        run: |
          python3 scripts/quality/run_checkpoint.py \
            --checkpoint bronze_conab_estimativa_graos \
            --bronze-dir /tmp/open-data-agro-lake/bronze/conab/estimativa-graos

      - name: Great Expectations Go integration
        run: GE_INTEGRATION=1 go test ./internal/processor -run 'Quality' -count=1
