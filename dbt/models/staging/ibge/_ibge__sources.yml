version: 2

sources:
  - name: ibge
    description: IBGE silver Delta tables promoted from bronze ingest.
    tables:
      - name: localidades_municipios
        description: IBGE municipality reference snapshot (API de Localidades).
      - name: localidades_ufs
        description: IBGE state (UF) reference snapshot (API de Localidades).
      - name: localidades_regioes
        description: IBGE macro-region reference snapshot (API de Localidades).
      - name: localidades_mesorregioes
        description: IBGE mesorregiao reference snapshot (API de Localidades).
      - name: localidades_microrregioes
        description: IBGE microrregiao reference snapshot (API de Localidades).
      - name: pam_area_quantidade
        description: PAM municipal area planted, harvested, and production quantity (SIDRA 1612).
      - name: pam_rendimento_valor
        description: PAM municipal yield and production value (SIDRA 1613).
      - name: pam_estabelecimentos
        description: PAM municipal farm establishment counts (SIDRA 5457).
      - name: lspa_area_producao
        description: LSPA monthly UF area planted, harvested, and production (SIDRA 6588).
      - name: pevs_producao_vegetal
        description: PEVS annual UF plant extraction quantity and value (SIDRA 289).
      - name: ppm_producao_municipal
        description: PPM municipal production quantity and value (SIDRA 74).
